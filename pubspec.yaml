name: beam_app
description: Beam - AI-Powered Document Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Supabase
  supabase_flutter: ^2.3.0

  # Data Classes
  equatable: ^2.0.5
  json_annotation: ^4.8.1

  # Document Scanner
  cunning_document_scanner: ^1.1.2

  # PDF Handling
  syncfusion_flutter_pdfviewer: ^24.1.41
  syncfusion_flutter_pdf: ^24.1.41
  pdfx: ^2.6.0
  printing: ^5.11.1

  # Document Editors
  flutter_quill: ^9.3.5
  flutter_inappwebview: ^6.0.0

  # Image Editing
  image_editor: ^1.3.0
  image_picker: ^1.0.5
  image: ^4.1.7

  # PDF Generation
  pdf: ^3.10.7

  # File Handling
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  share_plus: ^7.2.1

  # UI Components
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1

  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  mime: ^1.0.4
  http: ^1.2.0
  path: ^1.8.3
  collection: ^1.18.0

  # In-App Purchases
  in_app_purchase: ^3.1.11

  # Local Auth
  local_auth: ^2.1.8

  # Google Fonts
  google_fonts: ^6.1.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

  fonts:
    - family: BeamIcons
      fonts:
        - asset: assets/fonts/BeamIcons.ttf
